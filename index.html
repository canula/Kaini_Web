<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Kaini Instruments | Coming Soon</title>
    <meta name="description" content="Something new is on the way from Kaini Instruments. Stay tuned." />

    <link rel="canonical" href="https://kaini-instruments.com/" />

    <meta property="og:type" content="website" />
    <meta property="og:title" content="Kaini Instruments | Coming Soon" />
    <meta property="og:description" content="Something new is on the way from Kaini Instruments. Stay tuned." />
    <meta property="og:url" content="https://kaini-instruments.com/" />

    <link rel="icon" href="/assets/images/favicon.png" type="image/png" />
    <link rel="apple-touch-icon" href="/assets/images/apple-touch-icon.png" />
    <meta name="theme-color" content="#1a1a1a" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Audiowide&family=Inter:wght@400;600;700&display=swap" rel="stylesheet" />

    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body {
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: #1a1a1a;
        color: #94a3b8;
        font-family: 'Inter', sans-serif;
        text-align: center;
        padding: 2rem;
      }
      .logo { height: 2rem; margin-bottom: 2rem; }
      h1 {
        font-family: 'Audiowide', cursive;
        color: #f97316;
        font-size: clamp(1.5rem, 5vw, 3rem);
        margin-bottom: 1rem;
      }
      p {
        font-size: 1.125rem;
        max-width: 28rem;
        line-height: 1.6;
        margin-bottom: 2rem;
      }
      .contact-btn {
        display: inline-block;
        background: #f97316;
        color: #fff;
        font-weight: 600;
        padding: 0.75rem 2rem;
        border-radius: 0.5rem;
        text-decoration: none;
        border: none;
        cursor: pointer;
        font-size: 1rem;
        font-family: 'Inter', sans-serif;
        transition: background 0.2s;
      }
      .contact-btn:hover { background: #ea580c; }
      footer {
        position: fixed;
        bottom: 0;
        width: 100%;
        padding: 1.5rem;
        font-size: 0.75rem;
        color: #64748b;
        text-align: center;
      }
      footer a { color: #94a3b8; text-decoration: none; }
      footer a:hover { color: #f8fafc; }

      /* Modal */
      .modal-overlay {
        display: none;
        position: fixed;
        inset: 0;
        z-index: 60;
        align-items: center;
        justify-content: center;
        background: rgba(0,0,0,0.6);
        backdrop-filter: blur(4px);
      }
      .modal-overlay.open { display: flex; }
      .modal {
        background: #2a2a2a;
        border: 1px solid rgba(255,255,255,0.1);
        border-radius: 1rem;
        padding: 2rem;
        width: 100%;
        max-width: 26rem;
        margin: 1rem;
        position: relative;
      }
      .modal h2 { color: #f8fafc; font-size: 1.25rem; font-weight: 700; margin-bottom: 1rem; }
      .modal label { display: block; color: #94a3b8; font-size: 0.875rem; margin-bottom: 0.25rem; }
      .modal input, .modal textarea {
        width: 100%;
        background: #1a1a1a;
        border: 1px solid rgba(255,255,255,0.1);
        border-radius: 0.5rem;
        padding: 0.625rem 1rem;
        color: #f8fafc;
        font-size: 0.875rem;
        font-family: 'Inter', sans-serif;
        margin-bottom: 1rem;
        outline: none;
        transition: border-color 0.2s;
      }
      .modal input:focus, .modal textarea:focus { border-color: #f97316; }
      .modal textarea { resize: none; height: 6rem; }
      .close-btn {
        position: absolute;
        top: 1rem;
        right: 1rem;
        background: none;
        border: none;
        color: #94a3b8;
        cursor: pointer;
        font-size: 1.5rem;
        line-height: 1;
      }
      .close-btn:hover { color: #f8fafc; }
    </style>
  </head>
  <body>

    <img src="/assets/images/kaini-logo.svg" alt="Kaini Instruments" class="logo" />
    <h1>Coming Soon</h1>
    <p>Something new is on the way. We're working on it and can't wait to share it with you.</p>
    <button class="contact-btn" id="contact-open">Get in Touch</button>

    <footer>
      &copy; 2026 Kaini Instruments Ltd.
      &nbsp;&middot;&nbsp;
      <a href="/privacy">Privacy</a>
      &nbsp;&middot;&nbsp;
      <a href="/terms">Terms</a>
    </footer>

    <!-- Contact Modal -->
    <div class="modal-overlay" id="contact-modal">
      <div class="modal">
        <button class="close-btn" id="contact-close">&times;</button>
        <h2>Get in touch</h2>
        <form action="https://formsubmit.co/support@kaini-instruments.com" method="POST">
          <input type="hidden" name="_subject" value="New contact from kaini-instruments.com">
          <input type="hidden" name="_captcha" value="false">
          <input type="hidden" name="_next" value="https://kaini-instruments.com/">
          <input type="text" name="_honey" style="display:none">
          <label for="name">Name</label>
          <input id="name" name="name" type="text" required placeholder="Your name">
          <label for="email">Email</label>
          <input id="email" name="email" type="email" required placeholder="you@example.com">
          <label for="message">Message</label>
          <textarea id="message" name="message" required placeholder="How can we help?"></textarea>
          <button type="submit" class="contact-btn" style="width:100%">Send Message</button>
        </form>
      </div>
    </div>

    <script>
      const modal = document.getElementById('contact-modal');
      document.getElementById('contact-open').addEventListener('click', () => modal.classList.add('open'));
      document.getElementById('contact-close').addEventListener('click', () => modal.classList.remove('open'));
      modal.addEventListener('click', (e) => { if (e.target === modal) modal.classList.remove('open'); });
      document.addEventListener('keydown', (e) => { if (e.key === 'Escape') modal.classList.remove('open'); });
    </script>

  </body>
</html>
